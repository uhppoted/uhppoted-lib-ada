name: docgen

on:
  workflow_dispatch:

jobs:

  build:
    name: docgen
    runs-on: ubuntu-latest
    steps:

    - name: Check out code
      uses: actions/checkout@v6

    - name: Setup Alire
      uses: alire-project/setup-alire@v4

    - name: Install Ada tools
      run: |
        cd lib
        alr with gnatdoc
        alr toolchain
        # alr index     --print
        # alr toolchain --select

    - name: Build
      run: |
        make build-all
