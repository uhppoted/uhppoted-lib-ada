name: docgen

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:

  build:
    name: docgen
    runs-on: ubuntu-latest
    steps:

    - name: Check out code
      uses: actions/checkout@v6

    - name: Setup Alire
      uses: alire-project/setup-alire@v5

    - name: Setup gnatdoc
      uses: alire-project/alr-install@v2
      with:
        crates: gnatdoc

    - name: Build project
      run: |
        cd lib && alr build

    - name: Generate doc
      run: |
        mkdir -p adadoc
        cd lib && alr exec -- gnatdoc -l -P uhppoted_lib_ada.gpr -O ../adadoc
        ls -la ../adadoc

    - name: Upload Ada doc artifact
      uses: actions/upload-artifact@v6
      with:
        path: adadoc
        name: uhppoted-lib-ada-adadoc

    - name: Format source
      run: |
        cd lib && alr exec -- gnatpp -P uhppoted_lib_ada.gpr
        ls -la ../adadoc

    - name: Upload formatted source
      uses: actions/upload-artifact@v6
      with:
        path: lib/src
        name: uhppoted-lib-ada-src
