name: lint

on:
  workflow_dispatch:

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

    - name: Set up Alire
      run: |
        mkdir -p /opt/alire
        wget -O /tmp/alire.zip https://github.com/alire-project/alire/releases/download/v2.1.0/alr-2.1.0-bin-x86_64-linux.zip
        unzip /tmp/alire.zip -d /opt/alire
        echo "/opt/alire/bin" >> $GITHUB_PATH

    - name: Install Ada
      run: |
        alr config --global --set interactive.disabled true
        alr toolchain

    - name: Install AdaControl
      run: |
        apt update
        apt install adacontrol

    - name: Check out code
      uses: actions/checkout@v6

    - name: Build
      run: |
        make build-all

    - name: lint
      run: |
        adactl -h